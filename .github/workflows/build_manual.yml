name: Manual build release from tag

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: Tag or commit SHA

concurrency:
  group: master-builds
  cancel-in-progress: false   # wait until the current run finishes

jobs:
  Prepare:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - name: Resolve tag name
        id: resolve
        run: |
          INPUT="${{ inputs.tag }}"
          if [[ "$INPUT" =~ ^[0-9a-f]{40}$ ]]; then
            echo "tag=manual-${INPUT:0:7}" >> $GITHUB_OUTPUT
          else
            echo "tag=$INPUT" >> $GITHUB_OUTPUT
          fi
          echo "date=$(date -u +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
      - name: Create release
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          DATE="${{ steps.resolve.outputs.date }}"
          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Manual Build - ${DATE}" \
              --notes "Manual build from ${{ inputs.tag }}" \
              --latest=false \
              --target "${{ inputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  MSYS2:
    name: Windows-msys2-mingw64
    needs: Prepare
    runs-on: [ windows-latest ]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Install MSYS2 with MinGW 64-bit
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64 # D2TM is built within a MinGW64 bit environment
          update: true
          install: git gzip zip unzip mingw-w64-x86_64-toolchain mingw64/mingw-w64-x86_64-SDL2 mingw64/mingw-w64-x86_64-SDL2_mixer mingw64/mingw-w64-x86_64-SDL2_image mingw64/mingw-w64-x86_64-SDL2_ttf mingw64/mingw-w64-x86_64-cmake mingw-w64-x86_64-catch
      - name: configure Pagefile
        uses: al-cheb/configure-pagefile-action@v1.5
        with:
          minimum-size: 16GB
          maximum-size: 16GB
          disk-root: "C:"
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ needs.Prepare.outputs.tag }} -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"
      - name: Build
        run: |
          cd "${{ github.workspace }}\build"
          cmake --build . --target all -- -j -l 3
      - name: Test
        run: |
          cd "${{ github.workspace }}\build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.bat
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload Windows binary to release
        shell: bash
        run: |
          TAG="${{ needs.Prepare.outputs.tag }}"
          cp bin/d2tm.zip bin/d2tm-windows-${TAG}.zip
          gh release upload "$TAG" bin/d2tm-windows-${TAG}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Ubuntu:
    name: Ubuntu (x86)
    needs: [Prepare, MSYS2]
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 14
          platform: x86
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          cd "${{ github.workspace }}"
          chmod +x install_dependencies_ubuntu.sh
          ./install_dependencies_ubuntu.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ needs.Prepare.outputs.tag }} -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload Linux binary to release
        run: |
          TAG="${{ needs.Prepare.outputs.tag }}"
          cp bin/d2tm.zip bin/d2tm-linux-${TAG}.zip
          gh release upload "$TAG" bin/d2tm-linux-${TAG}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  MACOSX:
    name: Mac OS X (Arm64)
    needs: [Prepare, Ubuntu]
    runs-on: [ macos-15 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          ./install_dependencies_macosx.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ needs.Prepare.outputs.tag }} -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload macOS ARM binary to release
        run: |
          TAG="${{ needs.Prepare.outputs.tag }}"
          cp bin/d2tm.zip bin/d2tm-macos-arm-${TAG}.zip
          gh release upload "$TAG" bin/d2tm-macos-arm-${TAG}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  MACOSX_INTEL:
    name: Mac OS X (Intel)
    needs: [Prepare, MACOSX]
    runs-on: [ macos-15-intel ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          ./install_dependencies_macosx.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ needs.Prepare.outputs.tag }} -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload macOS Intel binary to release
        run: |
          TAG="${{ needs.Prepare.outputs.tag }}"
          cp bin/d2tm.zip bin/d2tm-macos-intel-${TAG}.zip
          gh release upload "$TAG" bin/d2tm-macos-intel-${TAG}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Cleanup:
    name: Prune old manual releases
    needs: [MSYS2, Ubuntu, MACOSX, MACOSX_INTEL]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete manual releases older than 30 days
        run: |
          CUTOFF=$(date -d '30 days ago' --utc +%Y-%m-%dT%H:%M:%SZ)
          gh release list --repo ${{ github.repository }} --limit 100 --json tagName,createdAt \
            | jq -r --arg cutoff "$CUTOFF" \
                '.[] | select(.tagName | startswith("manual-")) | select(.createdAt < $cutoff) | .tagName' \
            | while read TAG; do
                echo "Deleting release and tag: $TAG"
                gh release delete "$TAG" --yes --cleanup-tag
              done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
