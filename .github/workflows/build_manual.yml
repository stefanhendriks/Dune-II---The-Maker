name: Manual build release from tag

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string
        description: Tag

concurrency:
  group: master-builds
  cancel-in-progress: false   # wait until the current run finishes

jobs:
  MSYS2:
    name: Windows-msys2-mingw64
    runs-on: [ windows-latest ]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Install MSYS2 with MinGW 64-bit
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64 # D2TM is built within a MinGW64 bit environment
          update: true
          install: git gzip zip unzip mingw-w64-x86_64-toolchain mingw64/mingw-w64-x86_64-SDL2 mingw64/mingw-w64-x86_64-SDL2_mixer mingw64/mingw-w64-x86_64-SDL2_image mingw64/mingw-w64-x86_64-SDL2_ttf mingw64/mingw-w64-x86_64-cmake mingw-w64-x86_64-catch
      - name: configure Pagefile
        uses: al-cheb/configure-pagefile-action@v1.3
        with:
          minimum-size: 16GB
          maximum-size: 16GB
          disk-root: "C:"
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ inputs.tag }} -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"
      - name: Build
        run: |
          cd "${{ github.workspace }}\build"
          cmake --build . --target all -- -j -l 3
      - name: Test
        run: |
          cd "${{ github.workspace }}\build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.bat
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Create release and upload Windows binary
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            2>/dev/null || true
          cp bin/d2tm.zip bin/d2tm-windows-${{ inputs.tag }}.zip
          gh release upload "$TAG" bin/d2tm-windows-${{ inputs.tag }}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Ubuntu:
    name: Ubuntu (x86)
    needs: MSYS2
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 14
          platform: x86
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          cd "${{ github.workspace }}"
          chmod +x install_dependencies_ubuntu.sh
          ./install_dependencies_ubuntu.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ inputs.tag }} -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload Linux binary to release
        run: |
          cp bin/d2tm.zip bin/d2tm-linux-${{ inputs.tag }}.zip
          gh release upload "${{ inputs.tag }}" bin/d2tm-linux-${{ inputs.tag }}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  MACOSX:
    name: Mac OS X (Arm64)
    needs: Ubuntu
    runs-on: [ macos-15 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          ./install_dependencies_macosx.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ inputs.tag }} -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload macOS ARM binary to release
        run: |
          cp bin/d2tm.zip bin/d2tm-macos-arm-${{ inputs.tag }}.zip
          gh release upload "${{ inputs.tag }}" bin/d2tm-macos-arm-${{ inputs.tag }}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  MACOSX_INTEL:
    name: Mac OS X (Intel)
    needs: MACOSX
    runs-on: [ macos-15-intel ]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          ./install_dependencies_macosx.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DENV_D2TM_VERSION=${{ inputs.tag }} -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload macOS Intel binary to release
        run: |
          cp bin/d2tm.zip bin/d2tm-macos-intel-${{ inputs.tag }}.zip
          gh release upload "${{ inputs.tag }}" bin/d2tm-macos-intel-${{ inputs.tag }}.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
