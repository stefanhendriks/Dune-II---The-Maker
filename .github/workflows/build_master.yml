name: Build & Release

on:
  push:
    branches:
      - master

concurrency:
  group: master-builds
  cancel-in-progress: false   # wait until the current run finishes

jobs:
  MSYS2:
    name: Windows-msys2-mingw64
    runs-on: [ windows-latest ]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Install MSYS2 with MinGW 64-bit
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64 # D2TM is built within a MinGW64 bit environment
          update: true
          install: git gzip zip unzip mingw-w64-x86_64-toolchain mingw64/mingw-w64-x86_64-SDL2 mingw64/mingw-w64-x86_64-SDL2_mixer mingw64/mingw-w64-x86_64-SDL2_image mingw64/mingw-w64-x86_64-SDL2_ttf mingw64/mingw-w64-x86_64-cmake mingw-w64-x86_64-catch
      - name: configure Pagefile
        uses: al-cheb/configure-pagefile-action@v1.2
        with:
          minimum-size: 16GB
          maximum-size: 16GB
          disk-root: "C:"
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"
      - name: Build
        run: |
          cd "${{ github.workspace }}\build"
          cmake --build . --target all -- -j -l 3
      - name: Test
        run: |
          cd "${{ github.workspace }}\build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.bat
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Create bleeding edge release and upload Windows binary
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="bleeding-edge-${SHORT_SHA}"
          DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
          NOTES=$(printf 'Automated bleeding edge build from master branch.\n\nCommit: %s\nDate: %s' "${SHORT_SHA}" "${DATE}")
          gh release create "$TAG" \
            --prerelease \
            --title "Bleeding Edge - ${DATE} - ${SHORT_SHA}" \
            --notes "$NOTES" \
            2>/dev/null || true
          cp bin/d2tm.zip bin/d2tm-windows.zip
          gh release upload "$TAG" bin/d2tm-windows.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Ubuntu:
    name: Ubuntu (x86)
    needs: MSYS2
    runs-on: [ ubuntu-latest ]
    steps:
      - name: Set up GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: 14
          platform: x86
      #          platform: x64
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          cd "${{ github.workspace }}"
          chmod +x install_dependencies_ubuntu.sh
          ./install_dependencies_ubuntu.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload Linux binary to bleeding edge release
        run: |
          TAG="bleeding-edge-$(git rev-parse --short HEAD)"
          cp bin/d2tm.zip bin/d2tm-linux.zip
          gh release upload "$TAG" bin/d2tm-linux.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  MACOSX:
    name: Mac OS X
    needs: Ubuntu
    runs-on: [ macos-15 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
          fetch-depth: 0   # fetch full history to see all files
      - name: Install dependencies
        run: |
          ./install_dependencies_macosx.sh
      - name: Configure
        run: |
          cd "${{ github.workspace }}"
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: |
          cd "${{ github.workspace }}/build"
          make -j4
      - name: Test
        run: |
          cd "${{ github.workspace }}/build"
          ctest --output-on-failure
      - name: Produce binary
        run: |
          cd "${{ github.workspace }}"
          ./create_release.sh
      - name: Zip binary
        run: |
          cd "${{ github.workspace }}/bin"
          zip -vr d2tm.zip . -x "*.DS_Store"
      - name: Upload macOS binary to bleeding edge release
        run: |
          TAG="bleeding-edge-$(git rev-parse --short HEAD)"
          cp bin/d2tm.zip bin/d2tm-macos.zip
          gh release upload "$TAG" bin/d2tm-macos.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Cleanup-Old-Releases:
    needs: [MSYS2, Ubuntu, MACOSX]  # all builds must complete successfully
    name: Cleanup old bleeding edge releases
    runs-on: ubuntu-latest
    steps:
      - name: Delete bleeding edge releases older than 90 days
        run: |
          cutoff=$(date -u -d '90 days ago' +%s)
          gh release list --repo ${{ github.repository }} --limit 200 --json tagName,publishedAt \
            | jq -r '.[] | select(.tagName | startswith("bleeding-edge-")) | [.tagName, .publishedAt] | @tsv' \
            | while IFS=$'\t' read -r tag published; do
                epoch=$(date -u -d "$published" +%s)
                if [ "$epoch" -lt "$cutoff" ]; then
                  echo "Deleting old release: $tag"
                  gh release delete "$tag" --cleanup-tag --yes
                fi
              done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
